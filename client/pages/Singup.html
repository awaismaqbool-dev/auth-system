        <div class="main">
            <div class="mainSection">
        <div class="content_container">
            <h1>Sign Up For Free.</h1>
            <p>get you personal Dashboard </p>
            <form id="signupForm" onsubmit="sendData(event)">
               <div class="input_sec"><label for="userName">Full Name <br><input 
                id="userName" type="text" name="fullName" placeholder="Enter your Full Name " class="inputBar"></label></div>
               <div class="input_sec"><label for="userEmail">Email <br><input 
              id="userEmail"  type="email" name="email" placeholder="Enter your Email" class="inputBar"></label></div>
               <div class="input_sec"><label for="userPassword">Password<br><input 
             id="userPassword"   type="password" name="password" placeholder="Enter your password" class="inputBar" ></label></div>
               <div class="passwordChecker">
                <div class="line1  "></div><div class="line2  " ></div><div class="line3  "></div>
               </div>
               <span class="passwordStrength">Password Strenght: <p id="passwordStatus" ></p> </span>
            <button type="submit" class="main_button">Sign In <img src="../assets/images/sign in icon svg.svg" alt=""></button></form>
            <span class="Sing_In_Link">Already have an account?<a href="../pages/login.html">Sign In</a></span>
            <button class="google_sing_in main_button"><img src="../assets/images/devicon_google.svg" alt="google">Sign In With Google</button>
            </div></div>
