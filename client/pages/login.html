        <div class="main">
            <div class="mainSection">
        <div class="content_container">
            <h1>LogIn</h1>
            <p>Enter your email and password to securely access<br>your account and manage your services.</p>
            <form id="loginForm">
               <div class="input_sec"><label for="email">Email <br><input type="email" name="email" placeholder="Enter your Email" class="inputBar" id="userEmail" ></label></div>
               <div class="input_sec"><label for="password">Password<br><input type="password" name="password" placeholder="Enter your password" class="inputBar" id="userPassword"></label></div>
               <div class="passwordPro"><label for="checkbox"><input type="checkbox" name="rememberLogin" id="rememberLogin">Remember me</label> <a href="../pages/forgetPassword.html">Forgot Password</a></div>
            <button type="submit" class="main_button">Log In</button></form>
            <span class="Sing_In_Link">Don't have an account?<a href="../pages/Singup.html">Sign Up here</a></span>
            <button class="google_sing_in"><img src="../assets/images/devicon_google.svg" alt="google">Sign In With Google</button>
            </div></div>
